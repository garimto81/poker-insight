
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG POKER 모니터링 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; margin: 0 auto; 
            background: rgba(255,255,255,0.95); 
            border-radius: 15px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2c3e50; margin: 0; }
        .header p { color: #7f8c8d; margin: 5px 0; }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .stat-card { 
            background: white; padding: 20px; border-radius: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .stat-number { font-size: 2em; font-weight: bold; color: #3498db; }
        .stat-label { color: #7f8c8d; margin-top: 5px; }
        .chart-container { 
            background: white; padding: 20px; border-radius: 10px; 
            margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-wrapper { position: relative; height: 400px; }
        .gg-highlight { border-left: 4px solid #e74c3c; }
        .last-updated { 
            text-align: center; color: #7f8c8d; 
            font-size: 0.9em; margin-top: 20px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 GG POKER 모니터링 대시보드 v1.1.1</h1>
            <p>실시간 포커 사이트 트래픽 분석 • 자동 업데이트</p>
        </div>
        
        <div class="stats">
            <div class="stat-card gg-highlight">
                <div class="stat-number">2</div>
                <div class="stat-label">GG POKER 사이트</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">57</div>
                <div class="stat-label">모니터링 사이트</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">1,653</div>
                <div class="stat-label">현재 총 플레이어</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">30</div>
                <div class="stat-label">데이터 수집 기간 (일)</div>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>👥 온라인 플레이어 Top 10</h3>
            <div class="chart-wrapper">
                <canvas id="onlinePlayersChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>💰 캐시 플레이어 Top 10</h3>
            <div class="chart-wrapper">
                <canvas id="cashPlayersChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>🔥 24시간 피크 Top 10</h3>
            <div class="chart-wrapper">
                <canvas id="peak24hChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>📊 7일 평균 Top 10</h3>
            <div class="chart-wrapper">
                <canvas id="sevenDayAvgChart"></canvas>
            </div>
        </div>
        
        <div class="last-updated">
            마지막 업데이트: 2025-07-20 00:03:03 UTC
        </div>
    </div>

    <script>
        // 실제 서버 데이터를 동적으로 로드
        async function loadDashboardData() {
            try {
                const response = await fetch('./api_data.json');
                return await response.json();
            } catch (error) {
                console.error('Failed to load dashboard data:', error);
                // fallback data
                return {"last_updated": "2025-07-20T00:03:03.309875", "data_period_days": 30, "sites": {}, "dates": ["2025-07-20"], "summary": {"total_sites": 0, "gg_poker_sites": 0, "latest_total_players": 0, "data_points": 0}};
            }
        }
        
        // 메인 초기화 함수
        async function initializeDashboard() {
            const dashboardData = await loadDashboardData();
        
        // 공통 함수: 데이터별 상위 10개 사이트 추출
        function getTop10Sites(dataType) {
            const sites = Object.keys(dashboardData.sites).map(siteName => {
                const siteData = dashboardData.sites[siteName];
                let value = 0;
                
                switch(dataType) {
                    case 'players_online':
                        value = siteData.data.players_online[siteData.data.players_online.length - 1] || 0;
                        break;
                    case 'cash_players':
                        value = siteData.data.cash_players[siteData.data.cash_players.length - 1] || 0;
                        break;
                    case 'peak_24h':
                        value = siteData.data.peak_24h[siteData.data.peak_24h.length - 1] || 0;
                        break;
                    case 'seven_day_avg':
                        value = siteData.data.seven_day_avg[siteData.data.seven_day_avg.length - 1] || 0;
                        break;
                }
                
                return {
                    name: siteName,
                    value: value,
                    isGG: siteData.category === 'GG_POKER'
                };
            });
            
            return sites
                .filter(site => site.value > 0)
                .sort((a, b) => b.value - a.value)
                .slice(0, 10);
        }
        
        // 공통 함수: 차트 생성
        function createBarChart(canvasId, title, dataType) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const top10 = getTop10Sites(dataType);
            
            const labels = top10.map(site => site.name);
            const data = top10.map(site => site.value);
            const colors = top10.map(site => site.isGG ? '#e74c3c' : '#3498db');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: title,
                        data: data,
                        backgroundColor: colors,
                        borderColor: colors,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true },
                        x: {
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    }
                }
            });
        }
        
            // 통계 카드 업데이트
            document.querySelector('.stat-card .stat-number').textContent = dashboardData.summary.gg_poker_sites;
            document.querySelectorAll('.stat-card .stat-number')[1].textContent = dashboardData.summary.total_sites;
            document.querySelectorAll('.stat-card .stat-number')[2].textContent = dashboardData.summary.latest_total_players.toLocaleString();
            document.querySelectorAll('.stat-card .stat-number')[3].textContent = dashboardData.data_period_days;
            
            // 마지막 업데이트 시간 업데이트
            const lastUpdated = new Date(dashboardData.last_updated).toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            document.querySelector('.last-updated').textContent = `마지막 업데이트: ${lastUpdated}`;
            
            // 4개 차트 생성
            createBarChart('onlinePlayersChart', 'Online Players', 'players_online');
            createBarChart('cashPlayersChart', 'Cash Players', 'cash_players');
            createBarChart('peak24hChart', '24H Peak', 'peak_24h');
            createBarChart('sevenDayAvgChart', '7-Day Average', 'seven_day_avg');
        }
        
        // 페이지 로드 시 대시보드 초기화
        document.addEventListener('DOMContentLoaded', initializeDashboard);
    </script>
</body>
</html>
