
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG POKER 모니터링 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; margin: 0 auto; 
            background: rgba(255,255,255,0.95); 
            border-radius: 15px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #2c3e50; margin: 0; }
        .header p { color: #7f8c8d; margin: 5px 0; }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .stat-card { 
            background: white; padding: 20px; border-radius: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .stat-number { font-size: 2em; font-weight: bold; color: #3498db; }
        .stat-label { color: #7f8c8d; margin-top: 5px; }
        .chart-container { 
            background: white; padding: 20px; border-radius: 10px; 
            margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-wrapper { position: relative; height: 400px; }
        .gg-highlight { border-left: 4px solid #e74c3c; }
        .last-updated { 
            text-align: center; color: #7f8c8d; 
            font-size: 0.9em; margin-top: 20px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 GG POKER 모니터링 대시보드</h1>
            <p>실시간 포커 사이트 트래픽 분석 • 자동 업데이트</p>
        </div>
        
        <div class="stats">
            <div class="stat-card gg-highlight">
                <div class="stat-number">0</div>
                <div class="stat-label">GG POKER 사이트</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">5</div>
                <div class="stat-label">모니터링 사이트</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">2,235</div>
                <div class="stat-label">현재 총 플레이어</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">30</div>
                <div class="stat-label">데이터 수집 기간 (일)</div>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>📈 사이트별 플레이어 트렌드</h3>
            <div class="chart-wrapper">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <h3>🎯 현재 사이트 현황</h3>
            <div class="chart-wrapper">
                <canvas id="currentChart"></canvas>
            </div>
        </div>
        
        <div class="last-updated">
            마지막 업데이트: 2025-07-19 23:54:31 UTC
        </div>
    </div>

    <script>
        const dashboardData = {"last_updated": "2025-07-19T23:54:31.785705", "data_period_days": 30, "sites": {"0": {"name": "0", "category": "COMPETITOR", "data": {"dates": ["2025-07-19"], "players_online": [54], "cash_players": [54], "peak_24h": [0], "seven_day_avg": [0]}}, "15": {"name": "15", "category": "COMPETITOR", "data": {"dates": ["2025-07-19"], "players_online": [0], "cash_players": [28], "peak_24h": [7], "seven_day_avg": [0]}}, "2,989": {"name": "2,989", "category": "COMPETITOR", "data": {"dates": ["2025-07-19"], "players_online": [1596], "cash_players": [3478], "peak_24h": [2400], "seven_day_avg": [0]}}, "332": {"name": "332", "category": "COMPETITOR", "data": {"dates": ["2025-07-19"], "players_online": [22], "cash_players": [210], "peak_24h": [100], "seven_day_avg": [0]}}, "4,693": {"name": "4,693", "category": "COMPETITOR", "data": {"dates": ["2025-07-19"], "players_online": [563], "cash_players": [625], "peak_24h": [350], "seven_day_avg": [0]}}}, "dates": ["2025-07-19"], "summary": {"total_sites": 5, "gg_poker_sites": 0, "latest_total_players": 2235, "data_points": 5}};
        
        // 트렌드 차트
        const trendCtx = document.getElementById('trendChart').getContext('2d');
        const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#34495e'];
        
        const trendDatasets = [];
        let colorIndex = 0;
        
        Object.keys(dashboardData.sites).forEach(siteName => {
            const siteData = dashboardData.sites[siteName];
            const isGG = siteData.category === 'GG_POKER';
            
            trendDatasets.push({
                label: siteName,
                data: siteData.data.players_online,
                borderColor: colors[colorIndex % colors.length],
                backgroundColor: colors[colorIndex % colors.length] + '20',
                borderWidth: isGG ? 3 : 2,
                fill: false,
                tension: 0.1
            });
            colorIndex++;
        });
        
        new Chart(trendCtx, {
            type: 'line',
            data: {
                labels: dashboardData.dates,
                datasets: trendDatasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
        
        // 현재 상황 차트
        const currentCtx = document.getElementById('currentChart').getContext('2d');
        const currentLabels = [];
        const currentData = [];
        const currentColors = [];
        
        Object.keys(dashboardData.sites).forEach((siteName, index) => {
            const siteData = dashboardData.sites[siteName];
            if (siteData.data.players_online.length > 0) {
                currentLabels.push(siteName);
                currentData.push(siteData.data.players_online[siteData.data.players_online.length - 1]);
                currentColors.push(siteData.category === 'GG_POKER' ? '#e74c3c' : colors[index % colors.length]);
            }
        });
        
        new Chart(currentCtx, {
            type: 'bar',
            data: {
                labels: currentLabels,
                datasets: [{
                    label: 'Players Online',
                    data: currentData,
                    backgroundColor: currentColors,
                    borderColor: currentColors,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>
</body>
</html>
